<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>ADHDhelper Infinite Canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toolbar">
    <button id="pointerBtn">Pointer</button>
    <button id="penBtn">Pen</button>
    <button id="highlighterBtn">Highlighter</button>
    <button id="eraserBtn">Eraser</button>
    <button id="circleBtn">Circle</button>
    <button id="squareBtn">Square</button>
    <button id="triangleBtn">Triangle</button>
    <button id="stickyBtn">Sticky</button>
    <label>Sticky Color:<input type="color" id="stickyColor" value="#ffeb3b"></label>
    <button id="imageBtn">Image</button>
    <input type="file" id="imageLoader" accept="image/*">
    <button id="textBtn">Text</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
    <label>Pen Size:<input type="range" id="penSize" min="1" max="10" value="2"></label>
    <label>Highlighter Size:<input type="range" id="highlighterSize" min="5" max="100" value="8"></label>
    <label>Eraser Size:<input type="range" id="eraserSize" min="5" max="100" value="20"></label>
    <label>Erase Mode:<select id="eraserMode"><option value="partial">Partial</option><option value="whole">Whole Path</option></select></label>
    <label>Target:<select id="eraserTarget"><option value="both">Both</option><option value="pen">Pen</option><option value="highlighter">Highlighter</option></select></label>
    <label>Text Size:<input type="number" id="textSize" min="10" max="100" value="16"></label>
    <label>Text Color:<input type="color" id="textColor" value="#000000"></label>
    <label>Background:
      <select id="bgSelect">
        <option value="clean">Clean</option>
        <option value="grid" selected>Grid</option>
        <option value="dots">Dots</option>
      </select>
    </label>
    <button id="returnBtn">Return to Last Drawing</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="objectLayer"></div>
  <div id="cursorIndicator"></div>

  <!-- kolejność ważna: najpierw main.js (deklaracja zmiennych globalnych), później moduły -->
  <script src="main.js" defer></script>
  <script src="utils.js" defer></script>
  <script src="persistence.js" defer></script>
  <script src="drawing.js" defer></script>
  <script src="eraser.js" defer></script>
  <script src="shapes.js" defer></script>
  <script src="sticky.js" defer></script>
  <script src="image.js" defer></script>
  <script src="text.js" defer></script>
  <script src="objects.js" defer></script>
  <script src="interactions.js" defer></script>
</body>
</html>
